spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: testSecretKeyForDevelopmentPurposeOnly12345678901234567890
    expiration: 86400000

spring.cloud:
  discovery.enabled: false
eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    fr.matteofierquin.springchat: DEBUG