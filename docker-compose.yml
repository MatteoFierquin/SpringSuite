services:
  # Infrastructure
  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - springsuite-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  auth-db:
    image: postgres:18-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - springsuite-network

  calendar-db:
    image: postgres:18-alpine
    container_name: calendar-db
    environment:
      POSTGRES_DB: calendardb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - calendar-db-data:/var/lib/postgresql/data
    networks:
      - springsuite-network

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - springsuite-network

  # Services
  auth-service:
    build:
      context: ./SpringAuth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    ports:
      - "8081:8081"
    depends_on:
      service-registry:
        condition: service_healthy
      auth-db:
        condition: service_started
    networks:
      - springsuite-network

  calendar-service:
    build:
      context: ./calendar-service
      dockerfile: Dockerfile
    container_name: calendar-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://calendar-db:5432/calendardb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka
    ports:
      - "8083:8083"
    depends_on:
      service-registry:
        condition: service_healthy
      calendar-db:
        condition: service_started
    networks:
      - springsuite-network

  frontend:
    build:
      context: ./spring-suite-ui
      dockerfile: Dockerfile
    container_name: springsuite-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - springsuite-network

volumes:
  auth-db-data:
  calendar-db-data:

networks:
  springsuite-network:
    driver: bridge
